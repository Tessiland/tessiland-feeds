name: Aggiorna feed nuovi arrivi
on:
  schedule:
    - cron: "0 4 * * *"   # ogni giorno alle 04:00 UTC
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Genera il JSON
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: node generate-feed.mjs
      - name: Pubblica (commit)
        run: |
          git config user.name "tessiland-bot"
          git config user.email "bot@users.noreply.github.com"
          git add nuovi-arrivi.json
          git commit -m "Aggiorna nuovi-arrivi.json [skip ci]" || echo "Nessuna modifica"
          git push
